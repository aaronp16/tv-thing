# Example docker-compose for homelab deployment
# Copy this to docker-compose.yml and adjust as needed

services:
  book-thing:
    image: ghcr.io/aaronp16/book-thing:latest
    container_name: book-thing
    restart: unless-stopped
    ports:
      - "3001:3000"
      # Torrent port - needed for seeding/peer connections
      - "6881:6881/tcp"
      - "6881:6881/udp"
    volumes:
      # Mount your book library directory
      - /path/to/your/books:/books
    environment:
      # Required: MyAnonamouse credentials
      - MAM_ID=your_mam_id_here
      - MAM_UID=your_uid_here
      # Optional: Override torrent port (default: 6881)
      # - TORRENT_PORT=6881
      - NODE_ENV=production
