services:
  book-thing:
    build: .
    container_name: book-thing
    restart: unless-stopped
    ports:
      - '13338:3000'
    environment:
      - MAM_ID=${MAM_ID}
      - MAM_UID=${MAM_UID}
      - BOOKS_DIR=/books
      - QB_URL=${QB_URL}
      - QB_USERNAME=${QB_USERNAME}
      - QB_PASSWORD=${QB_PASSWORD}
      - QB_CATEGORY=${QB_CATEGORY:-books}
      - CALIBRE_WEB_URL=${CALIBRE_WEB_URL:-http://calibre-web:8083}
      - CALIBRE_WEB_USERNAME=${CALIBRE_WEB_USERNAME}
      - CALIBRE_WEB_PASSWORD=${CALIBRE_WEB_PASSWORD}
    volumes:
      - /home/aaron/data/media/books:/books
      - /home/aaron/homelab/data/torrents/books:/torrents:ro
